            Showing {filtered.length} of {STAT_BANK.length} stats. Categorized for quick deploy on calls.
          </div>
        </div>
      );
    }

    /* ----------------------- RX CALCULATOR ---------------------------------- */

    const RX_TIERS = [
      { id: 'A', total: '$50,000',  totalBenefit: 50000,  daily: '$150/day', cap: 300, premiumAnnual: 365.76, premiumMonthly: 30.48 },
      { id: 'B', total: '$100,000', totalBenefit: 100000, daily: '$300/day', cap: 600, premiumAnnual: 640.20, premiumMonthly: 53.35 },
      { id: 'C', total: '$150,000', totalBenefit: 150000, daily: '$450/day', cap: 900, premiumAnnual: 941.40, premiumMonthly: 78.45 },
    ];
    const RX_GENERIC_PER_FILL = 10;
    const RX_BRAND_PER_FILL = 25;

    function RxCalculator() {
      const [genMonthly, setGenMonthly] = useState(0);
      const [genQuarterly, setGenQuarterly] = useState(0);
      const [brandMonthly, setBrandMonthly] = useState(0);
      const [brandQuarterly, setBrandQuarterly] = useState(0);
      const [customPremA, setCustomPremA] = useState('');
      const [customPremB, setCustomPremB] = useState('');
      const [customPremC, setCustomPremC] = useState('');

      const sanitize = (v) => {
        const n = parseInt(v, 10);
        if (Number.isNaN(n) || n < 0) return 0;
        if (n > 50) return 50; // sane upper bound
        return n;
      };

      const sanitizePremium = (v) => {
        if (v === '') return '';
        const cleaned = String(v).replace(/[^0-9.]/g, '');
        const parts = cleaned.split('.');
        const trimmed = parts.length > 1 ? parts[0] + '.' + parts.slice(1).join('').slice(0, 2) : cleaned;
        const n = parseFloat(trimmed);
        if (Number.isNaN(n) || n < 0) return '';
        if (n > 5000) return '5000';
        return trimmed;
      };

      const genMonthlyAnnual = genMonthly * RX_GENERIC_PER_FILL * 12;
      const genQuarterlyAnnual = genQuarterly * RX_GENERIC_PER_FILL * 4;
      const brandMonthlyAnnual = brandMonthly * RX_BRAND_PER_FILL * 12;
      const brandQuarterlyAnnual = brandQuarterly * RX_BRAND_PER_FILL * 4;
      const potentialAnnual = genMonthlyAnnual + genQuarterlyAnnual + brandMonthlyAnnual + brandQuarterlyAnnual;

      const customPremiumValues = [customPremA, customPremB, customPremC];

      const tierResults = RX_TIERS.map((t, idx) => {
        const customStr = customPremiumValues[idx];
        const customNum = parseFloat(customStr);
        const useCustom = !Number.isNaN(customNum) && customNum > 0;
        const premiumAnnual = useCustom ? customNum : t.premiumAnnual;
        const premiumMonthly = premiumAnnual / 12;
        const reimbursement = Math.min(potentialAnnual, t.cap);
        const netAnnual = premiumAnnual - reimbursement;
        const netMonthly = netAnnual / 12;
        const capped = potentialAnnual > t.cap;
        // Value ratio = $ of HHC benefit per $1 of net annual cost.
        // Floor net at $1 to avoid divide-by-zero / negatives — when net <= $1, ratio just compares HHC sizes.
        const valueRatio = t.totalBenefit / Math.max(netAnnual, 1);
        return { ...t, premiumAnnual, premiumMonthly, reimbursement, netAnnual, netMonthly, capped, useCustom, valueRatio };
      });

      // Lowest net cost. Ties broken by higher tier (more HHC benefit).
      const lowestNetAnnual = Math.min(...tierResults.map(t => t.netAnnual));
      const bestFitId = [...tierResults].reverse().find(t => t.netAnnual === lowestNetAnnual)?.id;

      // Best value = highest HHC coverage per $1 of net cost. Ties broken by higher tier.
      const highestValue = Math.max(...tierResults.map(t => t.valueRatio));
      const bestValueId = [...tierResults].reverse().find(t => t.valueRatio === highestValue)?.id;

      const recsAlign = bestFitId === bestValueId;

      const totalMeds = genMonthly + genQuarterly + brandMonthly + brandQuarterly;
      const hasInput = totalMeds > 0;
      const customCount = tierResults.filter(t => t.useCustom).length;
      const anyCustomPremium = customCount > 0;
      const allCustomPremium = customCount === 3;

      const presetExamples = [
        { label: "John (4 meds, monthly)", values: { gm: 3, gq: 0, bm: 1, bq: 0 } },
        { label: "Mary (3 generics, monthly)", values: { gm: 3, gq: 0, bm: 0, bq: 0 } },
        { label: "Bruce (10 meds, quarterly)", values: { gm: 0, gq: 5, bm: 0, bq: 5 } },
        { label: "Bruce optimized (mixed cadence)", values: { gm: 3, gq: 2, bm: 0, bq: 5 } },
      ];

      const loadPreset = (v) => {
        setGenMonthly(v.gm);
        setGenQuarterly(v.gq);
        setBrandMonthly(v.bm);
        setBrandQuarterly(v.bq);
      };

      const reset = () => {
        setGenMonthly(0); setGenQuarterly(0); setBrandMonthly(0); setBrandQuarterly(0);
        setCustomPremA(''); setCustomPremB(''); setCustomPremC('');
      };

      const InputRow = ({ label, sublabel, value, onChange }) => (
        <div className="flex items-center justify-between gap-3 bg-white border border-light-cyan rounded-lg px-4 py-3 hover:border-accent/40 transition">
          <div className="flex-1 min-w-0">
            <div className="font-heading font-semibold text-secondary text-sm">{label}</div>
            <div className="text-xs text-mid-blue mt-0.5">{sublabel}</div>
          </div>
          <div className="flex items-center gap-2">
            <button
              onClick={() => onChange(Math.max(0, value - 1))}
              className="w-9 h-9 rounded-lg border border-light-cyan text-secondary font-heading font-semibold hover:border-accent hover:bg-accent/5 transition"
              aria-label={`Decrease ${label}`}
            >
              −
            </button>
            <input
              type="number"
              min={0}
              max={50}
              value={value}
              onChange={(e) => onChange(sanitize(e.target.value))}
              className="w-16 border border-light-cyan rounded-lg px-2 py-2 text-center text-secondary font-heading font-bold text-lg tabular-nums focus:border-accent focus:outline-none"
              aria-label={label}
            />
            <button
              onClick={() => onChange(value + 1)}
              className="w-9 h-9 rounded-lg border border-light-cyan text-secondary font-heading font-semibold hover:border-accent hover:bg-accent/5 transition"
              aria-label={`Increase ${label}`}
            >
              +
            </button>
          </div>
        </div>
      );

      return (
        <div className="space-y-5">
          <div>
            <h2 className="font-heading font-bold text-2xl text-secondary mb-2">Rx Reimbursement Calculator</h2>
            <p className="text-text leading-relaxed">
              Enter the prospect&apos;s medication count and fill cadence. The calculator shows annual reimbursement potential
              and net cost across all three HHC tiers. <span className="font-heading font-semibold">The lowest-net-cost tier is highlighted as &ldquo;best fit.&rdquo;</span>
            </p>
          </div>

          {/* Premium-source banner */}
          {anyCustomPremium ? (
            <div className="rounded-lg p-4 border-2 border-accent bg-accent/10">
              <div className="flex items-start gap-2">
                <span className="text-base leading-none mt-0.5">✓</span>
                <div className="text-xs leading-relaxed text-text">
                  <span className="font-heading font-semibold text-secondary">
                    Using the customer&apos;s actual quoted premiums for {tierResults.filter(t => t.useCustom).map(t => 'Plan ' + t.id).join(', ')}.
                  </span>{' '}
                  Net-cost calculations below reflect those values. Plans without a custom premium still show TX age 65 illustrative defaults.
                </div>
              </div>
            </div>
          ) : (
            <div className="rounded-lg p-4 border-2 border-amber-400 bg-amber-50">
              <div className="flex items-start gap-2">
                <span className="text-base leading-none mt-0.5">⚠</span>
                <div className="text-xs leading-relaxed text-text">
                  <span className="font-heading font-semibold text-secondary">
                    The premiums shown below are TX age 65 illustrative examples — not the actual price for any specific customer.
                  </span>{' '}
                  Premium varies by state, age, gender (where applicable), and benefit-period selection. For an accurate net-cost analysis on a real call, enter the customer&apos;s actual quoted premiums in the &ldquo;Customer-specific premiums&rdquo; section below.
                </div>
              </div>
            </div>
          )}

          {/* Preset examples */}
          <div className="bg-soft-blue/10 border border-light-cyan rounded-lg p-4">
            <div className="text-[10px] uppercase tracking-wider text-mid-blue font-heading font-semibold mb-2">Quick load</div>
            <div className="flex flex-wrap gap-2">
              {presetExamples.map((p, i) => (
                <button
                  key={i}
                  onClick={() => loadPreset(p.values)}
                  className="text-xs px-3 py-1.5 rounded-full border border-light-cyan bg-white text-secondary hover:border-accent hover:bg-accent/5 transition font-heading font-medium"
                >
                  {p.label}
                </button>
              ))}
              <button
                onClick={reset}
                className="text-xs px-3 py-1.5 rounded-full border border-light-cyan bg-white text-mid-blue hover:border-mid-blue transition font-heading font-medium"
              >
                Reset
              </button>
            </div>
          </div>

          {/* Inputs */}
          <div className="space-y-2">
            <div className="text-[10px] uppercase tracking-wider text-mid-blue font-heading font-semibold mb-1">Prospect medications</div>
            <InputRow
              label="Generic meds, filled monthly"
              sublabel={`$${RX_GENERIC_PER_FILL} per fill × 12 fills/year`}
              value={genMonthly}
              onChange={setGenMonthly}
            />
            <InputRow
              label="Generic meds, filled quarterly"
              sublabel={`$${RX_GENERIC_PER_FILL} per fill × 4 fills/year`}
              value={genQuarterly}
              onChange={setGenQuarterly}
            />
            <InputRow
              label="Brand-name meds, filled monthly"
              sublabel={`$${RX_BRAND_PER_FILL} per fill × 12 fills/year`}
              value={brandMonthly}
              onChange={setBrandMonthly}
            />
            <InputRow
              label="Brand-name meds, filled quarterly"
              sublabel={`$${RX_BRAND_PER_FILL} per fill × 4 fills/year`}
              value={brandQuarterly}
              onChange={setBrandQuarterly}
            />
          </div>

          {/* Customer-specific premiums (optional) */}
          <div className="bg-soft-blue/10 border border-light-cyan rounded-lg p-4">
            <div className="mb-3">
              <div className="flex items-center gap-2 mb-1">
                <div className="text-[10px] uppercase tracking-wider text-mid-blue font-heading font-semibold">
                  Customer-specific premiums
                </div>
                <span className="text-[9px] uppercase tracking-wider bg-soft-blue/30 text-secondary font-heading font-semibold px-1.5 py-0.5 rounded">Optional</span>
              </div>
              <div className="text-xs text-text leading-relaxed">
                Got an actual quote from the UNL Advocate for this customer? Enter the per-tier annual premium here to recalculate &ldquo;best fit&rdquo; on real numbers. Leave any field blank to keep the illustrative default for that tier.
              </div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
              {RX_TIERS.map((t, idx) => {
                const value = customPremiumValues[idx];
                const setValue = [setCustomPremA, setCustomPremB, setCustomPremC][idx];
                const isCustom = value !== '' && parseFloat(value) > 0;
                return (
                  <div key={t.id}>
                    <label className="block text-xs text-mid-blue mb-1 font-heading font-medium" htmlFor={`custom-prem-${t.id}`}>
                      Plan {t.id} actual premium
                    </label>
                    <div className="relative">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-mid-blue text-sm pointer-events-none">$</span>
                      <input
                        id={`custom-prem-${t.id}`}
                        type="text"
                        inputMode="decimal"
                        value={value}
                        onChange={(e) => setValue(sanitizePremium(e.target.value))}
                        placeholder={t.premiumAnnual.toFixed(2)}
                        className="w-full border border-light-cyan rounded-lg pl-7 pr-3 py-2 text-secondary font-heading font-semibold tabular-nums focus:border-accent focus:outline-none bg-white"
                        aria-label={`Plan ${t.id} actual annual premium`}
                      />
                    </div>
                    <div className="text-[10px] text-mid-blue mt-1">
                      /year ·{' '}
                      <span className={isCustom ? 'text-accent font-heading font-semibold' : ''}>
                        {isCustom ? 'using customer quote' : `default: $${t.premiumAnnual.toFixed(2)}`}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Annual reimbursement potential */}
          <div className="bg-secondary text-white rounded-lg p-5">
            <div className="text-[10px] uppercase tracking-wider text-soft-blue font-heading font-semibold mb-1">Annual reimbursement potential</div>
            <div className="text-4xl font-heading font-bold tabular-nums mb-3">${potentialAnnual.toLocaleString()}</div>
            {hasInput && (
              <div className="text-xs text-soft-blue space-y-0.5 leading-relaxed">
                {genMonthly > 0 && <div>Generic monthly: {genMonthly} × ${RX_GENERIC_PER_FILL} × 12 = ${genMonthlyAnnual.toLocaleString()}</div>}
                {genQuarterly > 0 && <div>Generic quarterly: {genQuarterly} × ${RX_GENERIC_PER_FILL} × 4 = ${genQuarterlyAnnual.toLocaleString()}</div>}
                {brandMonthly > 0 && <div>Brand monthly: {brandMonthly} × ${RX_BRAND_PER_FILL} × 12 = ${brandMonthlyAnnual.toLocaleString()}</div>}
                {brandQuarterly > 0 && <div>Brand quarterly: {brandQuarterly} × ${RX_BRAND_PER_FILL} × 4 = ${brandQuarterlyAnnual.toLocaleString()}</div>}
              </div>
            )}
            {!hasInput && (
              <div className="text-xs text-soft-blue italic">Enter medication counts above to see the breakdown.</div>
            )}
          </div>

          {/* Per-tier comparison */}
          <div>
            <div className="text-[10px] uppercase tracking-wider text-mid-blue font-heading font-semibold mb-2">
              Tier comparison ({allCustomPremium ? "customer's actual premiums" : anyCustomPremium ? 'mixed: customer quote + illustrative' : 'TX age 65 illustrative premiums'})
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
              {tierResults.map(t => {
                const isBestValue = t.id === bestValueId && hasInput;
                return (
                  <div
                    key={t.id}
                    className={
                      'rounded-lg p-4 border-2 transition ' +
                      (isBestValue
                        ? 'bg-accent/10 border-accent shadow-sm'
                        : 'bg-white border-light-cyan')
                    }
                  >
                    <div className="flex items-start justify-between mb-3 gap-2">
                      <div>
                        <div className="font-heading font-bold text-xl text-secondary">Plan {t.id}</div>
                        <div className="text-xs text-mid-blue">{t.total} HHC · {t.daily}</div>
                      </div>
                      <div className="flex flex-col items-end gap-1">
                        {isBestValue && (
                          <div className="text-[9px] uppercase tracking-wider bg-accent text-white font-heading font-bold px-2 py-1 rounded whitespace-nowrap">Best fit</div>
                        )}
                        {t.useCustom ? (
                          <div className="text-[9px] uppercase tracking-wider bg-secondary/80 text-white font-heading font-bold px-2 py-1 rounded whitespace-nowrap">Quote</div>
                        ) : (
                          <div className="text-[9px] uppercase tracking-wider bg-soft-blue/40 text-secondary font-heading font-bold px-2 py-1 rounded whitespace-nowrap">Illustrative</div>
                        )}
                      </div>
                    </div>
                    <div className="space-y-2 text-sm">
                      <div className="flex justify-between">
                        <span className="text-mid-blue">Annual premium</span>
                        <span className="text-secondary font-heading font-semibold tabular-nums">${t.premiumAnnual.toFixed(2)}</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-mid-blue">Rx cap</span>
                        <span className="text-secondary font-heading font-semibold tabular-nums">${t.cap}/yr</span>
                      </div>
                      <div className="flex justify-between border-t border-light-cyan pt-2">
                        <span className="text-mid-blue">Reimbursement</span>
                        <span className="text-secondary font-heading font-semibold tabular-nums">
                          ${t.reimbursement.toFixed(2)}
                          {t.capped && <span className="text-[10px] text-mid-blue ml-1">capped</span>}
                          {!t.capped && hasInput && potentialAnnual > 0 && <span className="text-[10px] text-mid-blue ml-1">actual</span>}
                        </span>
                      </div>
                      <div className="flex justify-between bg-soft-blue/10 -mx-4 px-4 py-2 mt-2">
                        <span className="text-secondary font-heading font-semibold">Net annual</span>
                        <span className="text-secondary font-heading font-bold tabular-nums">${t.netAnnual.toFixed(2)}</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-secondary font-heading font-semibold">Net monthly</span>
                        <span className="text-secondary font-heading font-bold tabular-nums">${t.netMonthly.toFixed(2)}</span>
                      </div>
                      {hasInput && (
                        <div className="flex justify-between border-t border-light-cyan pt-2 mt-2">
                          <span className="text-mid-blue text-xs">Coverage per $1 net</span>
                          <span className={
                            'tabular-nums text-xs font-heading font-semibold ' +
                            (isBestValue ? 'text-accent' : 'text-mid-blue')
                          }>
                            ${Math.round(t.valueRatio).toLocaleString()}
                          </span>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Recommendation reasoning */}
          {hasInput && (() => {
            const lowest = tierResults.find(t => t.id === bestFitId);
            const value = tierResults.find(t => t.id === bestValueId);
            const costDelta = value.netAnnual - lowest.netAnnual;
            const benefitDelta = value.totalBenefit - lowest.totalBenefit;

            return (
              <div className="bg-accent/5 border border-accent/30 rounded-lg p-4">
                <div className="text-[10px] uppercase tracking-wider text-accent font-heading font-semibold mb-2">How to position with the prospect</div>
                <div className="text-sm text-text leading-relaxed space-y-2">
                  <div>
                    Lead with Plan <span className="font-heading font-bold">{value.id}</span> — best coverage value at
                    {` `}<span className="font-heading font-semibold">${Math.round(value.valueRatio).toLocaleString()} of HHC benefit per $1 of net cost</span>
                    {` (${value.total} HHC · ${value.daily} · $${value.netAnnual.toFixed(2)}/yr net · $${value.netMonthly.toFixed(2)}/mo).`}
                    {value.id === 'A' && ` The prospect's reimbursement potential ($${potentialAnnual.toLocaleString()}) fits within Plan A's $300/year cap, so higher tiers don't add usable Rx benefit.`}
                    {value.id === 'B' && potentialAnnual >= 600 && ` The prospect maxes the $600 Rx cap, so the reimbursement covers most of the premium.`}
                    {value.id === 'B' && potentialAnnual < 600 && ` The prospect reaches $${potentialAnnual.toLocaleString()} of Plan B's $600 cap.`}
                    {value.id === 'C' && ` The prospect maxes Plan C's $900 cap, so the reimbursement covers most of the higher premium — and they get the richest HHC tier.`}
                  </div>
                  {!recsAlign && (
                    <div className="text-xs text-mid-blue pt-2 border-t border-accent/20">
                      <span className="font-heading font-semibold text-secondary">If the prospect is highly cost-sensitive,</span> Plan {lowest.id} is ${costDelta.toFixed(2)}/year cheaper ({costDelta / 12 < 0.50 ? `pennies/month` : `~$${(costDelta / 12).toFixed(2)}/month`}) — but they give up
                      {' '}<span className="font-heading font-semibold text-secondary">${benefitDelta.toLocaleString()} of HHC benefit</span>
                      {' '}({lowest.total} instead of {value.total}). Plan {value.id} is almost always the better recommendation when cost difference is this small.
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* Caveats */}
          <div className="bg-soft-blue/10 border border-light-cyan rounded-lg p-4 space-y-2">
            <div className="text-[10px] uppercase tracking-wider text-mid-blue font-heading font-semibold">Caveats</div>
            <ul className="text-xs text-text space-y-1 leading-relaxed">
              <li>• <span className="font-heading font-semibold">Premiums vary by state, age, gender, and selected benefit period.</span> Default premiums shown are TX age 65 illustrative rates pulled from UNL&apos;s prescription-reimbursement examples PDF. For real customers, enter the actual quoted premium per tier in the Customer-specific premiums section.</li>
              <li>• Rx reimbursement is calculated <span className="font-heading font-semibold">per fill</span>, not per prescription. Quarterly fills count as 4×/year; monthly count as 12×/year.</li>
              <li>• <span className="font-heading font-semibold">Rx reimbursement is NOT included in Kentucky.</span> HHC is otherwise available there but the prescription benefit is excluded by state law — adjust the pitch math accordingly.</li>
              <li>• Reimbursement is paid by claim submission to <span className="font-mono">claims@unlinsurance.com</span> with pharmacy receipt (pharmacy name, drug names, insured name, date, RX code).</li>
              <li>• <span className="font-heading font-semibold">&ldquo;Best fit&rdquo;</span> = the tier with the most HHC coverage per $1 of net annual cost. When reimbursement maxes across multiple tiers, the highest tier usually wins because the marginal cost is small ($1–$5/year) for $50K of additional HHC benefit. The cost columns on each card let agents reframe to the cheapest tier if a prospect is unusually price-sensitive.</li>
            </ul>
          </div>
        </div>
      );
    }

    /* ----------------------- RESOURCES OVERLAY (legacy tabs) ---------------- */

    function ResourcesOverlay({ open, onClose, isAdmin }) {
      const [activeTabState, setActiveTab] = useState('statbank');
      const [subTabState, setSubTabState] = useState({ practice: 'scenarios', earnings: 'projection', reference: 'states' });
      if (!open) return null;

      const allTabs = [
        { id: 'statbank',   label: 'Stat Bank',     icon: '📊' },
        { id: 'rxcalc',     label: 'Rx Calculator', icon: '💊' },
        { id: 'reference',  label: 'Reference',     icon: '📖' },
        { id: 'earnings',   label: 'Earnings',      icon: '💰' },
        { id: 'bugs',       label: 'Bug Reports',   icon: '🐛', adminOnly: true },
      ];
      const tabs = allTabs.filter(t => !t.adminOnly || isAdmin);
      // Derive active tab — if admin was disabled while viewing 'bugs', fall back to first available tab
      const activeTab = tabs.find(t => t.id === activeTabState) ? activeTabState : tabs[0].id;
      const subTab = subTabState[activeTab];
      const handleSubTabChange = (sub) => setSubTabState(s => ({ ...s, [activeTab]: sub }));

      return (
        <div className="fixed inset-0 bg-deep-navy/40 z-30 flex items-stretch" onClick={onClose} role="dialog" aria-modal="true">
          <div className="bg-white w-full max-w-6xl ml-auto h-full overflow-y-auto" onClick={(e) => e.stopPropagation()}>
            <div className="sticky top-0 bg-secondary text-white px-6 py-4 border-b border-deep-navy/20 flex items-center justify-between">
              <div>
                <div className="font-heading font-bold text-lg">Resources</div>
                <div className="text-xs text-soft-blue">Always available — reference content alongside the course</div>
              </div>
              <button onClick={onClose} className="text-white/80 hover:text-white text-2xl leading-none" aria-label="Close resources">×</button>
            </div>
            <div className="bg-secondary border-b border-deep-navy/20 px-6">
              <div className="flex gap-1">
                {tabs.map(t => (
                  <button
                    key={t.id}
                    onClick={() => setActiveTab(t.id)}
                    className={
                      'flex items-center gap-2 px-4 py-3 text-sm font-heading font-semibold border-b-2 transition ' +
                      (t.id === activeTab ? 'text-white border-accent' : 'text-white/70 border-transparent hover:text-white')
                    }
                  >
                    <span>{t.icon}</span>{t.label}
                  </button>
                ))}
              </div>
            </div>
            {SUB_TABS[activeTab] && (
              <div className="bg-white border-b border-light-cyan px-6">
                <div className="flex gap-1 overflow-x-auto scrollbar-hide">
                  {SUB_TABS[activeTab].map(sub => (
                    <button
                      key={sub.id}
                      onClick={() => handleSubTabChange(sub.id)}
                      className={
                        'px-4 py-2.5 text-sm font-heading font-medium border-b-2 transition whitespace-nowrap ' +
                        (sub.id === subTab ? 'text-secondary border-accent' : 'text-mid-blue border-transparent hover:text-secondary')
                      }
                    >
                      {sub.label}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <div className="p-6">
              {activeTab === 'statbank' && <StatBankView />}
              {activeTab === 'rxcalc' && <RxCalculator />}
              {activeTab === 'earnings' && <EarningsTab subTab={subTab} />}
              {activeTab === 'reference' && <ReferenceTab subTab={subTab} />}
              {activeTab === 'bugs' && <BugReportsViewer />}
            </div>
          </div>
        </div>
      );
    }

    /* ----------------------- COURSE PLAYER (top-level) ---------------------- */

    function CourseView({ progress, setProgress, isAdmin }) {
      const currentSectionId = progress.courseProgress?.currentSectionId || 'w.1';
      const completed = progress.courseProgress?.completedSectionIds || [];
      const isCurrentCompleted = completed.includes(currentSectionId);
      const [resourcesOpen, setResourcesOpen] = useState(false);
      const [bugReportOpen, setBugReportOpen] = useState(false);
      const [mobileNavOpen, setMobileNavOpen] = useState(false);

      // Reinforcement modal: shown once per day after certification
      const isCertified = !!progress.courseProgress?.certifiedAt;
      const lastShown = progress.courseProgress?.lastReinforcementShown;
      const today = new Date().toISOString().slice(0, 10);
      const shouldShowReinforcement = isCertified && lastShown !== today;
      const [reinforcementOpen, setReinforcementOpen] = useState(false);
      useEffect(() => {
        if (shouldShowReinforcement) {
          // Delay slightly so the page mounts before modal pops
          const t = setTimeout(() => setReinforcementOpen(true), 600);
          return () => clearTimeout(t);
        }
      }, [shouldShowReinforcement]);

      const navigate = useCallback((sectionId) => {
        setProgress(p => {
          const cp = p.courseProgress || {};
          const next = { ...p, courseProgress: { ...cp, currentSectionId: sectionId } };
          saveProgress(next);
          return next;
        });
        // Scroll to top on navigation
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, [setProgress]);

      const markComplete = useCallback((sectionId) => {
        setProgress(p => {
          const cp = p.courseProgress || {};
          const completedIds = cp.completedSectionIds || [];
          if (completedIds.includes(sectionId)) return p;
          const newCompleted = [...completedIds, sectionId];
          const isLastWelcome = sectionId === WELCOME_SECTIONS[WELCOME_SECTIONS.length - 1].id;
          const next = {
            ...p,
            courseProgress: {
              ...cp,
              completedSectionIds: newCompleted,
              welcomeCompleted: cp.welcomeCompleted || isLastWelcome,
            },
          };
          saveProgress(next);
          return next;
        });
      }, [setProgress]);

      // Suppress global footer on sections that drive their own progression UX
      // (gate-quiz, capstone, scenario, drill). Footer reappears once those sections complete.
      const currentFound = currentSectionId ? findSection(currentSectionId) : null;
      const sectionType = currentFound?.section?.type;
      const selfDrivenSection = sectionType === 'gate-quiz' || sectionType === 'capstone' || sectionType === 'scenario' || sectionType === 'drill';
      const gateKey = currentFound?.section?.gateFor;
      const gatePassed = gateKey ? progress.courseProgress?.masteryQuizzes?.[gateKey]?.passed : false;
      // Footer rules:
      //   reading sections     → always show
      //   gate-quiz            → show only after the gate is passed
      //   scenario / drill     → show only after the section is marked complete
      //   capstone             → show only after capstone passed
      let showFooter = !selfDrivenSection;
      if (sectionType === 'gate-quiz') showFooter = !!gatePassed;
      if (sectionType === 'scenario' || sectionType === 'drill') showFooter = isCurrentCompleted;
      if (sectionType === 'capstone') showFooter = !!progress.courseProgress?.capstone?.passed;

      return (
        <>
          <CourseProgressBar progress={progress} currentSectionId={currentSectionId} onOpenMobileNav={() => setMobileNavOpen(true)} isAdmin={isAdmin} />
          <div className="max-w-7xl mx-auto flex">
            <CourseSidebar
              progress={progress}
              currentSectionId={currentSectionId}
              onNavigate={navigate}
              onOpenResources={() => setResourcesOpen(true)}
              mobileOpen={mobileNavOpen}
              onCloseMobile={() => setMobileNavOpen(false)}
              isAdmin={isAdmin}
            />
            <div className="flex-1 min-w-0">
              <main className="px-6 md:px-10 py-10 max-w-3xl">
                <SectionContent sectionId={currentSectionId} progress={progress} setProgress={setProgress} isAdmin={isAdmin} />
              </main>
              {showFooter && (
                <NextStepFooter
                  currentSectionId={currentSectionId}
                  completed={isCurrentCompleted}
                  onMarkComplete={markComplete}
                  onNavigate={navigate}
                  isCertified={isCertified}
                />
              )}
            </div>
          </div>
          <ResourcesOverlay open={resourcesOpen} onClose={() => setResourcesOpen(false)} isAdmin={isAdmin} />
          <BugReportButton onClick={() => setBugReportOpen(true)} />
          <BugReportModal
            open={bugReportOpen}
            onClose={() => setBugReportOpen(false)}
            currentSectionId={currentSectionId}
            progress={progress}
          />
          <ReinforcementModal
            open={reinforcementOpen}
            onClose={() => setReinforcementOpen(false)}
            progress={progress}
            setProgress={setProgress}
          />
        </>
      );
    }

    /* ============================================================================
       SECTION: NAV / APP SHELL
       ============================================================================ */

    function Header({ isAdmin, adminEntryVisible, onOpenAdminModal }) {
      return (
        <header className="bg-secondary text-white py-4 px-6 md:px-8 border-b border-deep-navy/20">
          <div className="max-w-7xl mx-auto flex items-center justify-between gap-3">
            <div>
              <h1 className="font-heading font-bold text-xl md:text-2xl leading-tight">UNL Ancillary Sales Course</h1>
              <p className="text-soft-blue text-xs md:text-sm">Clear Path Coverage · For licensed agents</p>
            </div>
            <div className="flex items-center gap-2">
              {isAdmin && (
                <span
                  className="text-[10px] uppercase tracking-wider bg-amber-400 text-secondary font-heading font-bold px-2 py-1 rounded"
                  title="Admin mode is on. Click the gear to manage."
                >
                  Admin
                </span>
              )}
              {adminEntryVisible && (
                <button
                  onClick={onOpenAdminModal}
                  className="w-9 h-9 flex items-center justify-center rounded-full text-soft-blue hover:bg-white/10 hover:text-white transition text-lg"
                  aria-label={isAdmin ? 'Manage admin mode' : 'Enter admin mode'}
                  title={isAdmin ? 'Admin mode (click to manage)' : 'Admin mode (off)'}
                >
                  ⚙
                </button>
              )}
            </div>
          </div>
        </header>
      );
    }

    function TabNav({ activeTab, onTabChange }) {
      return (
        <nav className="bg-secondary border-b border-deep-navy/20 sticky top-0 z-10" aria-label="Main navigation">
          <div className="max-w-7xl mx-auto px-4 md:px-8">
            <div className="flex gap-1 overflow-x-auto scrollbar-hide">
              {TABS.map((tab) => {
                const isActive = tab.id === activeTab;
                return (
                  <button
                    key={tab.id}
                    onClick={() => onTabChange(tab.id)}
                    className={
                      'flex items-center gap-2 px-4 py-3 text-sm font-heading font-semibold border-b-2 transition whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-secondary ' +
                      (isActive
                        ? 'text-white border-accent'
                        : 'text-white/70 border-transparent hover:text-white hover:border-accent/50')
                    }
                    aria-current={isActive ? 'page' : undefined}
                  >
                    <span aria-hidden="true">{tab.icon}</span>
                    {tab.label}
                  </button>
                );
              })}
            </div>
          </div>
        </nav>
      );
    }

    function SubNav({ tab, activeSubTab, onSubTabChange }) {
      const subTabs = SUB_TABS[tab];
      if (!subTabs) return null;
      return (
        <div className="bg-white border-b border-light-cyan sticky top-12 z-10" role="tablist" aria-label={`${tab} sections`}>
          <div className="max-w-7xl mx-auto px-4 md:px-8">
            <div className="flex gap-1 overflow-x-auto scrollbar-hide">
              {subTabs.map((sub) => {
                const isActive = sub.id === activeSubTab;
                return (
                  <button
                    key={sub.id}
                    role="tab"
                    aria-selected={isActive}
                    onClick={() => onSubTabChange(sub.id)}
                    className={
                      'px-4 py-2.5 text-sm font-heading font-medium border-b-2 transition whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-accent ' +
                      (isActive
                        ? 'text-secondary border-accent'
                        : 'text-mid-blue border-transparent hover:text-secondary')
                    }
                  >
                    {sub.label}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // Migrate legacy v1 progress into v2 with courseProgress
    function migrateProgressToV2(loaded) {
      if (loaded.fresh) {
        return {
          schemaVersion: 2,
          agentId: null,
          amberAlertDismissed: false,
          // Legacy fields preserved so Resources overlay still works
          modulesCompleted: [],
          quizScores: {},
          scenariosCompleted: {},
          objectionsSeen: [],
          // New course progress
          courseProgress: {
            started: false,
            welcomeCompleted: false,
            currentSectionId: 'w.1',
            completedSectionIds: [],
            masteryQuizzes: {
              foundation: { passed: false, bestScore: null, attempts: 0 },
              method: { passed: false, bestScore: null, attempts: 0 },
            },
            capstone: { passed: false, bestScore: null, attempts: 0 },
            certifiedAt: null,
          },
        };
      }
      // Already v2 — return as-is
      if (loaded.schemaVersion === 2) return loaded;
      // Legacy v1 — preserve fields and add courseProgress
      return {
        ...loaded,
        schemaVersion: 2,
        courseProgress: loaded.courseProgress || {
          started: false,
          welcomeCompleted: false,
          currentSectionId: 'w.1',
          completedSectionIds: [],
          masteryQuizzes: {
            foundation: { passed: false, bestScore: null, attempts: 0 },
            method: { passed: false, bestScore: null, attempts: 0 },
          },
          capstone: { passed: false, bestScore: null, attempts: 0 },
          certifiedAt: null,
        },
      };
    }

    // Admin entry is hidden by default. Three ways to reveal the gear:
    //   1. URL hash:   ...UNL_Agent_Portal.html#admin
    //   2. URL query:  ...UNL_Agent_Portal.html?admin=1
    //   3. Keyboard:   Ctrl+Shift+A (or Cmd+Shift+A on Mac)
    // Once revealed, the password gate ('connor') still protects activation.
    // If admin mode is already active, the gear stays visible so the user can manage/disable it.
    function detectAdminEntry() {
      try {
        if (typeof window === 'undefined') return false;
        if (window.location.hash === '#admin') return true;
        const params = new URLSearchParams(window.location.search || '');
        if (params.get('admin') === '1') return true;
        return false;
      } catch {
        return false;
      }
    }

    function App() {
      const [progress, setProgress] = useState(() => {
        const loaded = loadProgress();
        const migrated = migrateProgressToV2(loaded);
        // Persist migration immediately if applicable
        if (loaded.schemaVersion !== 2) saveProgress(migrated);
        return migrated;
      });
      const [isAdmin, setIsAdminState] = useState(loadIsAdmin);
      const [adminModalOpen, setAdminModalOpen] = useState(false);
      const [adminEntryUnlocked, setAdminEntryUnlocked] = useState(detectAdminEntry);

      const setIsAdmin = (v) => {
        saveIsAdmin(v);
        setIsAdminState(v);
      };

      // Keyboard shortcut: Ctrl/Cmd+Shift+A reveals the gear
      useEffect(() => {
        const onKey = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'A' || e.key === 'a')) {
            e.preventDefault();
            setAdminEntryUnlocked(true);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, []);

      // Gear is visible when entry was unlocked OR when admin mode is already on (so user can manage/disable it)
      const adminEntryVisible = adminEntryUnlocked || isAdmin;

      return (
        <div className="min-h-screen bg-white">
          <Header
            isAdmin={isAdmin}
            adminEntryVisible={adminEntryVisible}
            onOpenAdminModal={() => setAdminModalOpen(true)}
          />
          <CourseView progress={progress} setProgress={setProgress} isAdmin={isAdmin} />
          <footer className="border-t border-light-cyan px-6 py-6 text-center text-xs text-mid-blue">
            UNL Agent Portal · Clear Path Coverage · For licensed agents only · Commission rates are working assumptions until UNL's final schedule arrives.
          </footer>
          <AdminToggleModal
            open={adminModalOpen}
            onClose={() => setAdminModalOpen(false)}
            isAdmin={isAdmin}
            setIsAdmin={setIsAdmin}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
