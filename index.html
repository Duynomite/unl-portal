              { id: 'el-pa-3', text: "Did you know your MA plan probably has a daily hospital copay if you ever got admitted?", quality: 'off-rail', response: "Wait, I'm worried about Robert and my fall, not hospital insurance. Are we talking about the same thing?", coaching: "Pivoted to HI when she's expressing HHC pain. Wrong lever. She didn't call about hospitalization — she called about caregiving." },

          ProblemAwareness: {

            choices: [

            prospectLine: "I want to stay home. Definitely. I've seen what facilities do to people. My father-in-law... that wasn't a good way to end. And I want Linda to stay home too, and I'd want Jessica nearby but not... not having to give up her job.",
            choices: [
              { id: 'cl-sa-1', text: "Yeah, that makes total sense. Have you ever looked into what Medicare actually covers for home care? Most folks haven't — Medicare covers about 100 days of skilled nursing after a hospital stay, but very little long-term home care after that. After that, you're paying out of pocket. Most home care actually runs around $5,000 a month — that's about $80,000 a year for full-time. Have you thought about how that would work for you if it ever came up?", quality: 'best', response: "Goodness, no. I just assumed Medicare covered most of that. $5,000 a month — we'd burn through our savings in maybe a year. Then what? Jessica can't quit her job, she's got kids in college coming up.", coaching: "Medicare-gap reveal + cost-of-care reveal in one move, perfectly tee'd up by his preference statement. He just articulated the consequence in his own words — savings burn, Jessica's job, kids' college. The pitch will land hard now because HE built the case for it. UNL brochure: median home care ~$80K/yr; aligns with Bianca's V1 $5,000/month framing." },

              { id: 'cl-sa-4', text: "Did you know Medicare doesn't cover long-term home care? Most folks don't realize that.", quality: 'good', response: "Really? I thought it did.", coaching: "Surfaced the gap but flat. Didn't tee up the COST of the gap, which is the consequence build. Pair the Medicare-gap reveal WITH the $5,000/month cost number for full impact." },

              { id: 'cl-co-1', text: "Yeah, that's the real concern most folks have — the burden falls on family even when there's no choice. So if there were a way to handle exactly what we just talked about — care at home if you needed it, $3,500 paid directly to Jessica if she stepped up to help, and to do it without burning through your savings — would that be worth a couple minutes to walk through? *[after yes]* So based on what you just told me — staying home matters, Jessica's the one who'd step up, you don't want her losing income or you burning through what you've saved — there's a Home Healthcare insurance plan that handles exactly that situation. Three things it does. First — $100,000 of home healthcare benefits if you ever needed care. Nursing, therapies, home aides, up to 360 days. Second — $3,500 paid directly to Jessica, in her own pocket, if she's the one caring for you. Up to twice in your lifetime. Third — there's a prescription benefit built into the plan: $25 back per brand fill, $10 per generic, capped at $600 a year. Does that match what you were hoping for? *[after yes]* On premium — bear with me, gross first then the math that matters. For someone your age in Georgia, the plan typically runs around $50-65 a month. Now here's the part that surprises folks: since you're already taking 4 prescriptions including Eliquis, that prescription benefit covers most of the premium back. Real cost ends up around $3-5 a month for someone in your situation. So to recap — for $3-5 a month real cost, $100,000 of home healthcare protection, $3,500 directly to Jessica if she ends up caring for you, and the prescription benefit covering most of the premium. Sound fair?", quality: 'best', response: "$3-5 a month? After the prescription benefit covers it? That sounds almost too good. So the prescription benefit alone covers the premium because I'm already paying for those prescriptions anyway?", coaching: "Full Solution Awareness bridge → anchored Presentation → math with pre-frame and ranges → summary. Notice every move references HIS specific words (staying home, Jessica, savings concern). The math pre-frame ('bear with me, gross first then the math that matters') mitigates sticker shock when $50-65 lands. Premium quoted as RANGE ($50-65, not $54.20) — defensible if actual quote varies. Carl's response confirms the framing landed: he's articulating the math himself ('the prescription benefit covers it because I'm already paying anyway'). That's the close." },
              { id: 'cl-co-2', text: "It's just $3.50 a month. You'd be crazy not to take this.", quality: 'off-rail', response: "$3.50? That doesn't sound right for any kind of insurance. And what do you mean 'crazy not to'? I haven't even seen what it covers.", coaching: "Quoted a point estimate ($3.50) instead of a range — sets up credibility break if actual quote runs higher. Skipped the value pitch (HHC, $3,500 caregiver, prescription benefit). 'You'd be crazy not to' is high-pressure language — exactly what brokered seniors hang up on." },
              { id: 'cl-co-3', text: "Premium runs about $54 a month, but after the prescription benefit you're at like $3.50/month real cost. $50K in home healthcare benefits, the caregiver thing, prescription savings. Want to move forward?", quality: 'off-rail', response: "Wait, you said $50K? I thought it was $100,000. Hold on, what's the actual amount?", coaching: "Got the math direction but THREE problems: (1) point estimates, not ranges; (2) feature-dump tone instead of anchored framing; (3) wrong HHC benefit number ($50K is Plan A, not Plan B). With 4 meds + Eliquis, Carl fits Plan B ($100K). Match the tier to the prescription profile — Section 1.6." },

      if (w) return { section: w, part: null, partIdx: -1, sectionIdx: WELCOME_SECTIONS.indexOf(w), isWelcome: true };
      for (let pIdx = 0; pIdx < COURSE.length; pIdx++) {

        if (sIdx !== -1) return { section: part.sections[sIdx], part, partIdx: pIdx, sectionIdx: sIdx, isWelcome: false };

    function getNextSectionId(currentId) {
      if (!currentId) return WELCOME_SECTIONS[0].id;
      const wIdx = WELCOME_SECTIONS.findIndex(s => s.id === currentId);
      if (wIdx !== -1) {
        if (wIdx + 1 < WELCOME_SECTIONS.length) return WELCOME_SECTIONS[wIdx + 1].id;
        return COURSE[0].sections[0].id; // first section of Part 1

      if (sectionIdx + 1 < part.sections.length) return part.sections[sectionIdx + 1].id;
      if (partIdx + 1 < COURSE.length) return COURSE[partIdx + 1].sections[0].id;

      const priorGate = priorPart.sections.find(s => s.type === 'gate-quiz' || s.type === 'cert');
      if (priorGate?.gateFor) return progress.courseProgress?.masteryQuizzes?.[priorGate.gateFor]?.passed ?? false;
      // Part 3 → Part 4: require all scenarios built into Part 3 to be completed

        const completed = progress.courseProgress?.completedSectionIds || [];
        return part3SectionIds.every(id => completed.includes(id));
      }
      return false;
    }

    function isSectionAccessible(progress, sectionId, isAdmin = false) {
      if (isAdmin) return true;
      const found = findSection(sectionId);
      if (!found) return false;
      if (found.isWelcome) return true;
      const partUnlocked = isPartUnlocked(progress, found.partIdx);
      if (!partUnlocked) return false;
      const completed = progress.courseProgress?.completedSectionIds || [];
      const part = found.part;
      // Practice (Part 3) and Capstone (Part 4) allow free navigation within the unlocked part —
      // scenarios are order-independent and the capstone has its own internal flow.
      if (part.id === 'practice' || part.id === 'capstone') return true;

      // to the gate quiz without having read the prerequisite material.
      if (completed.includes(sectionId)) return true;
      const firstUncompletedIdx = part.sections.findIndex(s => !completed.includes(s.id));
      return firstUncompletedIdx === found.sectionIdx;

    function ScenarioEngine({ scenario, onComplete, onClose }) {
      const [stageIdx, setStageIdx] = useState(0);
      const [history, setHistory] = useState([]);
      const [done, setDone] = useState(false);

      const rail = scenario.rail || NEPQ_RAIL;
      const isCapstone = !!scenario.passThreshold;
      const maxScore = rail.length;
      const passThreshold = scenario.passThreshold;

      const currentStage = rail[stageIdx];
      const currentStageData = scenario.stages[currentStage];
      const lastResponse = history.length > 0 ? history[history.length - 1].response : scenario.opening;

      const QUALITY_SCORES = { best: 1, better: 0.5, good: 0, 'off-rail': -0.5 };

      const handleChoice = (choice) => {
        const next = [...history, { stage: currentStage, choiceId: choice.id, choiceText: choice.text, quality: choice.quality, response: choice.response, coaching: choice.coaching }];
        setHistory(next);

        if (stageIdx + 1 >= rail.length) {
          const score = next.reduce((s, h) => s + QUALITY_SCORES[h.quality], 0);
          let band;
          if (isCapstone) {
            band = score >= passThreshold ? 'pass' : 'fail';
          } else {
            band = score >= 4 ? 'strong' : score >= 2 ? 'mid' : 'weak';
          }
          onComplete(scenario.id, score, band);
          setDone(true);
        } else {
          setStageIdx(stageIdx + 1);
        }
      };

      const handleRetry = () => {
        setStageIdx(0);
        setHistory([]);
        setDone(false);
      };

      if (done) {
        const score = history.reduce((s, h) => s + QUALITY_SCORES[h.quality], 0);
        let band;
        if (isCapstone) {

          band = score >= 4 ? 'strong' : score >= 2 ? 'mid' : 'weak';

        const bandConfig = {

          mid:    { color: 'bg-amber-50 border-amber-300', icon: '↻', label: 'Mid run', message: 'You got there but skipped some Problem Awareness or Consequence questions. That\'s the #1 trigger of "I want to think about it" objections later.' },
          weak:   { color: 'bg-red-50 border-red-300', icon: '↺', label: 'Weak run', message: 'You reverted to Era 1 / Era 2 patterns — stating instead of asking, leading the prospect, or pushing too hard. Re-read the NEPQ Method module before retrying.' },
          pass:   { color: 'bg-accent/10 border-accent', icon: '🎓', label: 'Capstone passed', message: `Score ${score.toFixed(1)} of ${maxScore}.0 — clean NEPQ run, multi-objection handled, curveball navigated honestly. You\'re certified. The Readiness Scorecard is ready in the next section.` },
          fail:   { color: 'bg-amber-50 border-amber-300', icon: '↻', label: 'Capstone — try again', message: `Score ${score.toFixed(1)} of ${maxScore}.0 (need ${passThreshold} to pass). Review the off-rail moments below, identify the pattern, and retry. Each pass deepens the rep — there\'s no penalty for retries.` },

            <div className={'rounded-lg border-2 p-6 text-center mb-6 ' + cfg.color}>
              <div className="text-6xl mb-2">{cfg.icon}</div>
              <h2 className="font-heading font-bold text-3xl text-secondary mb-2">{cfg.label}</h2>
              <div className="font-heading text-2xl tabular-nums mb-2">Score: {score >= 0 ? '+' : ''}{score.toFixed(1)} / {maxScore.toFixed(1)}</div>
              <p className="text-text text-sm leading-relaxed max-w-xl mx-auto">{cfg.message}</p>
            </div>

            <div className="bg-white border border-light-cyan rounded-lg p-6 mb-5">
              <h3 className="font-heading font-semibold text-secondary mb-4">Transcript replay</h3>

          {/* Last prospect response */}

            <div className="text-xs font-heading font-semibold text-mid-blue mb-1">{scenario.name.toUpperCase()} {history.length === 0 && '(opening)'}</div>

          </div>

          <div className="mb-3">
            <p className="text-mid-blue text-sm">Pick what you'd say next. After you click, you'll see how the prospect responds and a coach's note on whether the move was effective. Don't overthink it — try a few approaches and learn from the feedback.</p>
          </div>

          {/* Choices */}
          <div className="space-y-3 mb-6">
            {currentStageData.choices.map((c, i) => (
              <button
                key={c.id}
                onClick={() => handleChoice(c)}

          {/* History (collapsed reference) */}

              <div className="mt-3 space-y-3 bg-light-cyan/20 p-4 rounded-lg">
                {history.map((h, i) => (
                  <div key={i} className="text-xs border-b border-light-cyan pb-2 last:border-b-0 last:pb-0">

    /* ----------------------- PART 3 SCENARIO WRAPPERS ---------------------- */

    function ScenarioSectionWrapper({ scenarioId, sectionId, progress, setProgress }) {
      const scenario = SCENARIOS.find(s => s.id === scenarioId);
      const completed = progress.courseProgress?.completedSectionIds || [];
      const isCompleted = completed.includes(sectionId);

      const handleScenarioComplete = (id, score, band) => {

          const cp = p.courseProgress || {};
          const scenarioRuns = cp.scenarioRuns || {};
          const prevRuns = scenarioRuns[id] || [];
          const newRun = { score, band, at: new Date().toISOString() };
          const newCompleted = completed.includes(sectionId) ? completed : [...completed, sectionId];
          const next = {
            ...p,
            courseProgress: {
              ...cp,
              scenarioRuns: { ...scenarioRuns, [id]: [...prevRuns, newRun] },
              completedSectionIds: newCompleted,
            },
          };
          saveProgress(next);
          return next;
        });
      };

      const learning = SCENARIO_LEARNING[scenarioId] || {};
      const found = findSection(sectionId);

      return (

    /* ----------------------- OBJECTION DRILL MODE -------------------------- */

    const DRILL_TARGET = 10; // Section 3.11 marks complete after this many drills.

    function ObjectionDrillSection({ progress, setProgress }) {
      const completed = progress.courseProgress?.completedSectionIds || [];
      const isCompleted = completed.includes('3.11');
      const drillStats = progress.courseProgress?.drillStats || { total: 0, byObjection: {} };
      const [phase, setPhase] = useState('intro'); // intro | confidence | reveal | self-rate | done
      const [currentObj, setCurrentObj] = useState(null);
      const [confidence, setConfidence] = useState(null);
      const [closeness, setCloseness] = useState(null);

      const drillsCompleted = drillStats.total;

      const pickRandomObjection = () => {
        // Weighted: re-surface ones the agent rated 'far' more often
        const weights = OBJECTIONS.map(o => {
          const stats = drillStats.byObjection[o.id];
          if (!stats) return 1;
          if (stats.lastCloseness === 'far') return 3;
          if (stats.lastCloseness === 'partial') return 2;
          return 1;
        });
        const total = weights.reduce((a, b) => a + b, 0);
        let r = Math.random() * total;
        for (let i = 0; i < OBJECTIONS.length; i++) {
          r -= weights[i];
          if (r <= 0) return OBJECTIONS[i];
        }
        return OBJECTIONS[OBJECTIONS.length - 1];
      };

      const startDrill = () => {
        setCurrentObj(pickRandomObjection());
        setConfidence(null);
        setCloseness(null);
        setPhase('confidence');
      };

      const handleConfidence = (level) => {
        setConfidence(level);
        setPhase('reveal');
      };

      const handleCloseness = (level) => {
        setCloseness(level);
        // persist drill outcome
        setProgress(p => {
          const cp = p.courseProgress || {};
          const stats = cp.drillStats || { total: 0, byObjection: {} };
          const objStats = stats.byObjection[currentObj.id] || { drills: 0, lastCloseness: null };
          const newTotal = stats.total + 1;
          const updated = {
            ...stats,
            total: newTotal,
            byObjection: {
              ...stats.byObjection,
              [currentObj.id]: { drills: objStats.drills + 1, lastCloseness: level, lastConfidence: confidence },
            },
          };
          const newCompleted = newTotal >= DRILL_TARGET && !cp.completedSectionIds?.includes('3.11')
            ? [...(cp.completedSectionIds || []), '3.11']
            : (cp.completedSectionIds || []);
          const next = { ...p, courseProgress: { ...cp, drillStats: updated, completedSectionIds: newCompleted } };
          saveProgress(next);
          return next;
        });
        setPhase('self-rate-done');
      };

      const nextDrill = () => {
        if (drillsCompleted + 1 >= DRILL_TARGET && !isCompleted) {
          setPhase('done');
        } else {
          startDrill();
        }
      };

      // INTRO
      if (phase === 'intro') {
        return (
          <div className="space-y-6">
            <div className="flex items-center gap-2 text-sm text-mid-blue">
              <span className="font-heading font-semibold">Part 3 · Practice</span>
              <span>·</span><span>Section 3.8</span><span>·</span><span>~30 min</span>
            </div>
            <h1 className="font-heading font-bold text-3xl md:text-4xl text-secondary leading-tight">
              Objection Drill Mode
            </h1>
            <p className="text-lg text-text leading-relaxed">
              The 25 most common objections, drilled one at a time with confidence-rating before reveal and self-assessment
              after. Objections you rate "far from the model" will resurface more often — that's the spaced-practice
              mechanism working.
            </p>
            <div className="bg-light-cyan/30 border border-light-cyan rounded-lg p-5">
              <div className="font-heading font-semibold text-secondary mb-2">How a drill works</div>
              <ol className="space-y-1 text-text text-sm list-decimal list-inside">
                <li>Random objection appears.</li>
                <li>You rate your confidence (1-5) <span className="font-heading font-semibold">before</span> seeing the answer.</li>
                <li>Reveal the model response. Compare it to what you would have said.</li>

    function ReinforcementModal({ open, onClose, progress, setProgress, onNavigateSection }) {
      // Pull a random subset of mastery-quiz questions the user previously answered for review
      const cards = useMemo(() => {
        const pool = [];
        FOUNDATION_QUIZ_QUESTIONS.forEach(q => pool.push({ ...q, gate: 'foundation' }));
        METHOD_QUIZ_QUESTIONS.forEach(q => pool.push({ ...q, gate: 'method' }));
        // Shuffle, take 4
        const shuffled = [...pool].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, 4);
      }, [open]);
      const [idx, setIdx] = useState(0);
      const [picked, setPicked] = useState(null);

      useEffect(() => { if (open) { setIdx(0); setPicked(null); } }, [open]);
      if (!open) return null;
      const card = cards[idx];
      const isLast = idx >= cards.length - 1;

      // Centralized dismiss — saves lastReinforcementShown so the modal doesn't re-pop today
      // regardless of how the user dismisses (complete all 4, X close, Skip the rest, backdrop tap)
      const dismiss = () => {
        setProgress(p => {
          const cp = p.courseProgress || {};
          const next = { ...p, courseProgress: { ...cp, lastReinforcementShown: new Date().toISOString().slice(0, 10) } };
          saveProgress(next);
          return next;
        });
        onClose();
      };

      const handlePick = (i) => setPicked(i);
      const handleNext = () => {
        if (isLast) {
          dismiss();
        } else {
          setIdx(idx + 1);
          setPicked(null);
        }
      };

      return (
        <div className="fixed inset-0 bg-deep-navy/40 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" onClick={dismiss}>
          <div className="bg-white rounded-lg shadow-xl max-w-xl w-full max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>

              <div>
                <div className="font-heading font-semibold text-secondary text-lg">Quick review · Card {idx + 1} of {cards.length}</div>
                <div className="text-xs text-mid-blue mt-0.5">Stay sharp. {card.gate === 'foundation' ? 'Foundation topic' : 'Method topic'} · {card.topic}</div>
              </div>
              <button onClick={dismiss} className="text-mid-blue hover:text-secondary text-2xl leading-none" aria-label="Close">×</button>
            </div>
            <div className="px-6 py-5 space-y-4">
              <h3 className="font-heading font-semibold text-secondary text-base leading-snug">{card.q}</h3>
              <div className="space-y-2">
                {card.choices.map((choice, i) => {
                  const isPicked = picked === i;

                      className={`w-full text-left p-3 border-2 rounded-md text-sm transition ${bg}`}

                  const variations = STATE_VARIATIONS[code] || [];

                  const renderHI = () => {
                    if (hiStatus === 'available') return <span className="text-accent font-semibold">✓ Available</span>;
                    if (hiStatus === 'unavailable') return <span className="text-red-600 font-semibold">✗ NOT available</span>;
                    return <span className="text-amber-700 font-semibold">? Not in matrix</span>;
                  };
                  const renderHHC = () => {
                    if (hhcStatus === 'available') return <span className="text-accent font-semibold">✓ Available</span>;
                    if (hhcStatus === 'unavailable') return <span className="text-red-600 font-semibold">✗ NOT available</span>;
                    return <span className="text-amber-700 font-semibold">? Not in matrix</span>;
                  };
                  const renderRx = () => {
                    if (hhcStatus !== 'available') return <span className="text-soft-blue">—</span>;
                    if (rxIncluded) return <span className="text-accent font-semibold">✓ Included</span>;
                    return <span className="text-red-600 font-semibold">✗ NOT included</span>;
                  };
                  return (
                    <tr key={code} className="border-b border-light-cyan hover:bg-light-cyan/30">
                      <td className="px-4 py-3 font-heading font-medium">{code} <span className="text-mid-blue text-xs">({STATE_FULL_NAMES[code]})</span></td>
                      <td className="px-4 py-3">{renderHI()}</td>
                      <td className="px-4 py-3">{renderHHC()}</td>
                      <td className="px-4 py-3">{renderRx()}</td>
                      <td className="px-4 py-3 text-mid-blue text-xs">
                        {variations.length === 0 ? <span className="text-soft-blue">—</span> : (
                          <ul className="list-disc list-inside space-y-0.5">{variations.map((v, i) => <li key={i}>{v}</li>)}</ul>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <p className="text-mid-blue text-xs mt-4">Counts based on UNL's published Shield Series state availability ({STATE_RULES_DATE}). States flagged "? Verify" aren't on the published available list — always confirm with the Advocate before pitching.</p>

    function CourseProgressBar({ progress, currentSectionId, onOpenMobileNav, isAdmin }) {

                >
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2">
                    <line x1="3" y1="6" x2="17" y2="6" />
                    <line x1="3" y1="10" x2="17" y2="10" />
                    <line x1="3" y1="14" x2="17" y2="14" />
                  </svg>
                </button>
                <div className="font-heading font-semibold text-secondary truncate">UNL Ancillary Sales Course</div>
              </div>
              <div className="text-mid-blue tabular-nums whitespace-nowrap">{overallPct}% complete</div>
            </div>
            <div className="flex gap-2">
              {COURSE.map((part, idx) => {
                const partPct = getPartProgressPct(progress, idx);
                const unlocked = isPartUnlocked(progress, idx, isAdmin);

                return (
                  <div key={part.id} className="flex-1" title={`Part ${part.number}: ${part.title}`}>
                    <div className="flex items-center justify-between mb-1 text-[11px]">
                      <span className={`font-heading font-semibold ${isCurrent ? 'text-accent' : (unlocked ? 'text-secondary' : 'text-soft-blue')}`}>
                        {isComplete ? '✓ ' : ''}Part {part.number}
                      </span>
                      <span className="text-mid-blue tabular-nums">{partPct}%</span>
                    </div>
                    <div className="h-1.5 bg-light-cyan rounded-full overflow-hidden">
                      <div
                        className={`h-full rounded-full transition-all duration-500 ${unlocked ? 'bg-accent' : 'bg-soft-blue/50'}`}
                        style={{ width: partPct + '%' }}
                      />

                      {part.title}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function CourseSidebar({ progress, currentSectionId, onNavigate, onOpenResources, mobileOpen, onCloseMobile, isAdmin }) {
      const completed = progress.courseProgress?.completedSectionIds || [];
      const [manualExpanded, setManualExpanded] = useState({});
      const currentFound = currentSectionId ? findSection(currentSectionId) : null;
      const currentPartIdx = currentFound?.partIdx ?? -1;
      const handleNavigate = (id) => { onNavigate(id); if (onCloseMobile) onCloseMobile(); };

      const renderItem = (section) => {
        const isCompleted = completed.includes(section.id);
        const isCurrent = section.id === currentSectionId;
        const accessible = isSectionAccessible(progress, section.id, isAdmin);
        const icon = isCompleted ? '✓' : (accessible ? '○' : '🔒');
        return (
          <button
            key={section.id}
            disabled={!accessible}
            onClick={() => accessible && handleNavigate(section.id)}
            className={
              'w-full text-left px-3 py-2 rounded-md text-sm flex items-start gap-2 transition ' +
              (isCurrent
                ? 'bg-accent/15 text-secondary font-heading font-semibold'
                : (accessible
                  ? 'text-text hover:bg-light-cyan/40'
                  : 'text-soft-blue cursor-not-allowed'))
            }
            aria-current={isCurrent ? 'page' : undefined}
          >
            <span className={`text-xs leading-5 ${isCompleted ? 'text-accent' : (accessible ? 'text-mid-blue' : 'text-soft-blue')}`}>
              {icon}
            </span>
            <span className="flex-1 leading-5">{section.title}</span>
            {section.estimatedMin && (
              <span className="text-[10px] text-soft-blue tabular-nums leading-5">{section.estimatedMin}m</span>
            )}
          </button>
        );
      };
      const sidebarBody = (
          <div className="p-4">
            <div className="lg:hidden flex items-center justify-between mb-3">
              <div className="font-heading font-semibold text-secondary">Course outline</div>
              <button onClick={onCloseMobile} className="text-mid-blue hover:text-secondary text-2xl leading-none p-1" aria-label="Close menu">×</button>
            </div>
            <div className="mb-2 text-[10px] uppercase tracking-wider text-mid-blue font-heading font-semibold">Getting started</div>
            <div className="space-y-0.5 mb-4">
              {WELCOME_SECTIONS.map(s => renderItem(s))}
            </div>
            {COURSE.map((part, idx) => {
              const unlocked = isPartUnlocked(progress, idx, isAdmin);
              const partCompleted = part.sections.every(s => completed.includes(s.id));
              const isCurrentPart = idx === currentPartIdx;
              // Default expansion: current part OR (unlocked AND not yet completed). Locked parts collapsed.
              const defaultExpanded = isCurrentPart || (unlocked && !partCompleted);
              const expanded = manualExpanded[part.id] ?? defaultExpanded;
              const togglePart = () => setManualExpanded(s => ({ ...s, [part.id]: !expanded }));
              return (
                <div key={part.id} className="mb-2">
                  <button
                    onClick={togglePart}
                    className="w-full flex items-center justify-between px-2 py-1.5 rounded-md hover:bg-light-cyan/30 transition"
                    aria-expanded={expanded}
                  >
                    <div className="flex items-center gap-2 flex-1 min-w-0">
                      <span className={`text-[10px] transition-transform inline-block ${expanded ? 'rotate-90' : ''} text-mid-blue`}>▸</span>
                      <span className={`text-[10px] uppercase tracking-wider font-heading font-semibold ${unlocked ? 'text-mid-blue' : 'text-soft-blue'}`}>
                        Part {part.number} · {part.title}
                      </span>
                    </div>
                    {!unlocked && <span className="text-[10px] text-soft-blue ml-1">🔒</span>}
                    {partCompleted && <span className="text-[10px] text-accent ml-1">✓</span>}
                  </button>
                  {expanded && (
                    <div className="space-y-0.5 mt-1 ml-2">
                      {part.id === 'practice' ? (
                        // Group Practice scenarios visually by call archetype
                        part.sections.map((s, i) => {
                          const groupLabel = (
                            s.id === '3.1' ? 'CROSS-SELL · after MA enrollment' :
                            s.id === '3.6' ? 'STANDALONE · HHC-specific lead' :
                            s.id === '3.8' ? 'BROKERED · general-benefits inbound' :
                            s.id === '3.11' ? 'DRILL · objection practice' :
                            null
                          );
                          return (
                            <React.Fragment key={s.id}>
                              {groupLabel && (
                                <div className={`text-[9px] uppercase tracking-wider text-mid-blue font-heading font-semibold pl-3 ${i === 0 ? 'mt-1' : 'mt-3'} mb-1`}>
                                  {groupLabel}
                                </div>
                              )}
                              {renderItem(s)}
                            </React.Fragment>
                          );
                        })
                      ) : (
                        part.sections.map(s => renderItem(s))
                      )}
                    </div>
                  )}
                  {!expanded && !unlocked && (
                    <div className="ml-7 mt-0.5 mb-2 text-[11px] text-soft-blue italic">
                      {part.number === 1
                        ? 'Finish the welcome flow to unlock'
                        : `Complete Part ${part.number - 1} to unlock`}
                    </div>
                  )}
                </div>

    function MasteryQuizView({
      questions,
      gateKey,
      title,
      passingScore,
      progress,
      onPass,
      onFail,
    }) {
      const [phase, setPhase] = useState('intro'); // 'intro' | 'quiz' | 'review-fail' | 'pass'
      const [qIdx, setQIdx] = useState(0);
      const [answered, setAnswered] = useState(null); // index of selected choice
      const [results, setResults] = useState([]); // [{correct: bool, qIdx, picked}]
      const quizState = progress.courseProgress?.masteryQuizzes?.[gateKey] || { passed: false, bestScore: null, attempts: 0 };

      // If already passed, show pass state immediately
      useEffect(() => {
        if (quizState.passed && phase === 'intro') setPhase('pass');
      }, [quizState.passed]);

      const handleStart = () => {
        setPhase('quiz');
        setQIdx(0);
        setAnswered(null);
        setResults([]);
      };

      const handleAnswer = (idx) => {
        if (answered !== null) return;
        setAnswered(idx);
      };

      const handleNext = () => {
        const isCorrect = answered === questions[qIdx].correctIdx;
        const newResults = [...results, { qIdx, picked: answered, correct: isCorrect }];
        setResults(newResults);
        setAnswered(null);
        if (qIdx + 1 < questions.length) {
          setQIdx(qIdx + 1);
        } else {
          // Quiz complete
          const correctCount = newResults.filter(r => r.correct).length;
          const score = correctCount / questions.length;
          if (score >= passingScore) {
            onPass(score);
            setPhase('pass');
          } else {
            onFail(score, newResults);
            setPhase('review-fail');
          }
        }
      };

      // INTRO state
      if (phase === 'intro') {
        return (
          <div className="space-y-6">
            <div className="flex items-center gap-2 text-sm text-mid-blue">
              <span className="font-heading font-semibold">Part 1 · Foundation</span>
              <span>·</span><span>Section 1.7</span><span>·</span><span>Mastery Quiz</span>

              the goal is mastery, not a single-shot test.

              <div className="font-heading font-semibold text-secondary mb-2">Before you start, ask yourself</div>
              <ul className="space-y-1 text-sm text-text">
                <li>• Could you explain the difference between HI and major medical to someone who's never heard of either?</li>

            {quizState.attempts > 0 && (
              <div className="text-sm text-mid-blue">

            )}
            <button
              onClick={handleStart}
              className="bg-accent hover:bg-accent/90 text-deep-navy font-heading font-semibold px-8 py-3 rounded-lg shadow-sm transition flex items-center gap-2"
            >
              {quizState.attempts > 0 ? 'Retry quiz' : 'Start quiz'}
              <span aria-hidden="true">→</span>
            </button>
          </div>
        );
      }

      // QUIZ state
      if (phase === 'quiz') {
        const q = questions[qIdx];
        const isAnswered = answered !== null;
        const isCorrect = answered === q.correctIdx;
        return (
          <div className="space-y-6 max-w-2xl">
            <div className="flex items-center justify-between text-sm">
              <span className="text-mid-blue">Question {qIdx + 1} of {questions.length}</span>
              <span className="text-mid-blue">{q.topic}</span>
            </div>
            <div className="h-1 bg-light-cyan rounded-full overflow-hidden">
              <div className="h-full bg-accent transition-all duration-300" style={{ width: ((qIdx + (isAnswered ? 1 : 0)) / questions.length * 100) + '%' }} />
            </div>
            <h2 className="font-heading font-bold text-xl md:text-2xl text-secondary leading-snug">{q.q}</h2>
            <div className="space-y-2">
              {q.choices.map((choice, idx) => {
                const isSelected = answered === idx;
                const isCorrectChoice = idx === q.correctIdx;
                let bg = 'bg-white border-light-cyan hover:border-mid-blue';
                if (isAnswered) {
                  if (isCorrectChoice) bg = 'bg-accent/15 border-accent';
                  else if (isSelected) bg = 'bg-red-50 border-red-300';
                  else bg = 'bg-light-cyan/20 border-light-cyan opacity-60';
                }
                return (
                  <button
                    key={idx}
                    onClick={() => handleAnswer(idx)}
                    disabled={isAnswered}
                    className={`w-full text-left p-4 border-2 rounded-lg transition ${bg} ${!isAnswered ? 'cursor-pointer' : 'cursor-default'}`}
                  >
                    <div className="flex items-start gap-3">
                      <span className="flex-shrink-0 w-6 h-6 rounded-full border border-mid-blue flex items-center justify-center text-xs font-heading font-semibold text-mid-blue">
                        {String.fromCharCode(65 + idx)}
                      </span>
                      <span className="text-text text-sm leading-relaxed">{choice}</span>
                      {isAnswered && isCorrectChoice && <span className="ml-auto text-accent text-lg">✓</span>}
                      {isAnswered && isSelected && !isCorrectChoice && <span className="ml-auto text-red-500 text-lg">✗</span>}
                    </div>
                  </button>
                );
              })}
            </div>
            {isAnswered && (
              <div className={`border-l-4 ${isCorrect ? 'border-accent bg-accent/5' : 'border-red-400 bg-red-50'} pl-5 py-3`}>
                <div className={`text-[10px] uppercase tracking-wider font-heading font-semibold mb-1 ${isCorrect ? 'text-accent' : 'text-red-600'}`}>
                  {isCorrect ? 'Correct' : 'Not quite'}

                <p className="text-sm text-text leading-relaxed">{q.explain}</p>
              </div>

            {isAnswered && (
              <button
                onClick={handleNext}
                className="bg-secondary hover:bg-secondary/90 text-white font-heading font-semibold px-6 py-3 rounded-lg shadow-sm transition flex items-center gap-2"
              >

    function saveBugReport(report) {
      try {
        const reports = loadBugReports();
        reports.push(report);
        localStorage.setItem(BUGS_STORAGE_KEY, JSON.stringify(reports));
        return true;
      } catch (e) {
        return false;
      }
    }

    function clearBugReports() {
      try { localStorage.removeItem(BUGS_STORAGE_KEY); return true; } catch (e) { return false; }
    }

    function buildBugReportPayload({ description, expected, steps, sectionId, progress }) {
      const found = sectionId ? findSection(sectionId) : null;
      const sectionLabel = found
        ? (found.isWelcome ? `Welcome · ${found.section.title}` : `Part ${found.part.number} · ${found.section.title}`)
        : 'Unknown';
      return {
        id: 'bug_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        timestamp: new Date().toISOString(),
        description: description || '',
        expected: expected || '',
        steps: steps || '',
        section: { id: sectionId || null, label: sectionLabel },
        viewport: { width: window.innerWidth, height: window.innerHeight, devicePixelRatio: window.devicePixelRatio },
        userAgent: navigator.userAgent,
        progressSnapshot: {
          welcomeCompleted: progress?.courseProgress?.welcomeCompleted,
          currentSectionId: progress?.courseProgress?.currentSectionId,
          completedSectionIds: progress?.courseProgress?.completedSectionIds,
          masteryQuizzes: progress?.courseProgress?.masteryQuizzes,
          capstone: progress?.courseProgress?.capstone,
          certifiedAt: progress?.courseProgress?.certifiedAt,
        },
        agentId: progress?.agentId || null,
        portalVersion: 'phase-10',
      };
    }

    function buildMailtoLink(report) {
      const subject = `[UNL Portal Bug] ${report.section.label} — ${(report.description || '').slice(0, 60)}`;
      const body = [
        'Bug Report from UNL Agent Portal',
        '================================',
        '',
        `Reported: ${report.timestamp}`,
        `Section: ${report.section.label}`,
        `Section ID: ${report.section.id || '—'}`,
        `Agent ID: ${report.agentId || 'anonymous'}`,
        '',
        '--- WHAT HAPPENED ---',
        report.description || '(none)',
        '',
        '--- WHAT WAS EXPECTED ---',
        report.expected || '(none)',
        '',
        '--- STEPS TO REPRODUCE ---',
        report.steps || '(none)',
        '',
        '--- DIAGNOSTIC CONTEXT (do not edit) ---',
        JSON.stringify(report, null, 2),
      ].join('\n');
      return `mailto:${SUPPORT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    function BugReportButton({ onClick }) {
      return (
        <button
          onClick={onClick}
          className="fixed bottom-6 right-6 z-40 bg-secondary hover:bg-secondary/90 text-white shadow-lg rounded-full px-5 py-3 flex items-center gap-2 font-heading font-semibold text-sm transition group"
          aria-label="Report a bug"
        >
          <span aria-hidden="true">🐛</span>
          <span className="hidden md:inline">Report bug</span>
        </button>
      );
    }

    function AdminToggleModal({ open, onClose, isAdmin, setIsAdmin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      useEffect(() => {
        if (open) { setPassword(''); setError(''); }
      }, [open]);

      if (!open) return null;

      const handleEnable = () => {
        if (password.toLowerCase().trim() === ADMIN_PASSWORD) {
          setIsAdmin(true);
          onClose();
        } else {
          setError('Incorrect password.');
        }
      };

      const handleDisable = () => {
        setIsAdmin(false);
        onClose();
      };

      return (
        <div
          className="fixed inset-0 z-[60] bg-secondary/40 flex items-center justify-center p-4"
          onClick={onClose}
        >
          <div
            className="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl"
            onClick={(e) => e.stopPropagation()}
          >
            {isAdmin ? (
              <>
                <div className="flex items-start justify-between mb-3 gap-3">
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] uppercase tracking-wider bg-amber-400 text-secondary font-heading font-bold px-2 py-1 rounded">Admin</span>
                    <h2 className="font-heading font-bold text-xl text-secondary">Admin mode is on</h2>
                  </div>
                  <button onClick={onClose} className="text-2xl text-mid-blue hover:text-secondary leading-none" aria-label="Close">×</button>
                </div>
                <p className="text-sm text-text leading-relaxed mb-4">
                  Section locks are bypassed and the Bug Reports tab is visible in Resources. Agents do not see this mode.
                </p>
                <div className="flex gap-2">
                  <button
                    onClick={handleDisable}
                    className="flex-1 bg-secondary text-white font-heading font-semibold py-2.5 rounded-full hover:opacity-90 transition"
                  >
                    Turn off admin mode
                  </button>
                  <button
                    onClick={onClose}
                    className="px-5 border border-light-cyan rounded-full font-heading font-semibold text-secondary hover:border-accent transition"
                  >
                    Keep on
                  </button>
                </div>
              </>
            ) : (
              <>
                <div className="flex items-start justify-between mb-3 gap-3">
                  <h2 className="font-heading font-bold text-xl text-secondary">Enter admin mode</h2>
                  <button onClick={onClose} className="text-2xl text-mid-blue hover:text-secondary leading-none" aria-label="Close">×</button>
                </div>
                <p className="text-sm text-text leading-relaxed mb-4">
                  Admin mode unlocks all sections and reveals the Bug Reports tab in Resources. Intended for content review only — not for agents.
                </p>
                <label className="block text-xs text-mid-blue mb-1 font-heading font-medium" htmlFor="admin-password">Password</label>
                <input
                  id="admin-password"
                  type="password"

                  onChange={(e) => { setPassword(e.target.value); setError(''); }}
                  onKeyDown={(e) => { if (e.key === 'Enter') handleEnable(); }}
                  autoFocus
                  className="w-full border border-light-cyan rounded-lg px-3 py-2 text-secondary font-heading focus:border-accent focus:outline-none"
                />
                {error && <div className="text-xs text-red-600 mt-1 font-heading font-medium">{error}</div>}
                <div className="flex gap-2 mt-4">
                  <button
                    onClick={handleEnable}
                    className="flex-1 bg-accent text-white font-heading font-semibold py-2.5 rounded-full hover:opacity-90 transition"
                  >
                    Enable
                  </button>
                  <button
                    onClick={onClose}
                    className="px-5 border border-light-cyan rounded-full font-heading font-semibold text-secondary hover:border-accent transition"
                  >
                    Cancel
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    function BugReportModal({ open, onClose, currentSectionId, progress }) {
      const [description, setDescription] = useState('');
      const [expected, setExpected] = useState('');
      const [steps, setSteps] = useState('');
      const [phase, setPhase] = useState('form'); // 'form' | 'submitted'

      // Reset on close
      useEffect(() => {
        if (!open) {
          setDescription(''); setExpected(''); setSteps(''); setPhase('form');
        }
      }, [open]);

      if (!open) return null;

      const found = currentSectionId ? findSection(currentSectionId) : null;
      const sectionLabel = found
        ? (found.isWelcome ? `Welcome · ${found.section.title}` : `Part ${found.part.number} · ${found.section.title}`)
        : 'Unknown section';

      const handleSubmit = () => {
        const trimmed = description.trim();
        if (!trimmed) return;
        const report = buildBugReportPayload({ description: trimmed, expected: expected.trim(), steps: steps.trim(), sectionId: currentSectionId, progress });
        saveBugReport(report);
        const mailto = buildMailtoLink(report);
        window.location.href = mailto;
        setPhase('submitted');
      };

      return (
        <div className="fixed inset-0 bg-deep-navy/40 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true" onClick={onClose}>
          <div className="bg-white rounded-lg shadow-xl max-w-lg w-full max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
            {phase === 'form' && (
              <>
                <div className="px-6 py-4 border-b border-light-cyan flex items-center justify-between">
                  <div>
                    <div className="font-heading font-semibold text-secondary text-lg">Report a bug</div>
                    <div className="text-xs text-mid-blue mt-0.5">Currently on: {sectionLabel}</div>
                  </div>
                  <button onClick={onClose} className="text-mid-blue hover:text-secondary text-2xl leading-none" aria-label="Close">×</button>
                </div>
                <div className="px-6 py-4 space-y-4">
                  <div>
                    <label className="block text-sm font-heading font-semibold text-secondary mb-1">What happened? <span className="text-red-500">*</span></label>
                    <textarea
                      value={description}
                      onChange={e => setDescription(e.target.value)}
                      rows={4}
                      placeholder="Describe what you saw or what went wrong…"
                      className="w-full border border-light-cyan rounded-md px-3 py-2 text-sm focus:border-accent focus:outline-none"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-heading font-semibold text-secondary mb-1">What did you expect to happen? <span className="text-mid-blue text-xs">(optional)</span></label>
                    <textarea
                      value={expected}
                      onChange={e => setExpected(e.target.value)}
                      rows={2}
                      placeholder="What should have happened instead?"
                      className="w-full border border-light-cyan rounded-md px-3 py-2 text-sm focus:border-accent focus:outline-none"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-heading font-semibold text-secondary mb-1">Steps to reproduce <span className="text-mid-blue text-xs">(optional)</span></label>
                    <textarea
                      value={steps}
                      onChange={e => setSteps(e.target.value)}
                      rows={2}
                      placeholder="What did you click/do right before the bug happened?"
                      className="w-full border border-light-cyan rounded-md px-3 py-2 text-sm focus:border-accent focus:outline-none"
                    />
                  </div>
                  <div className="bg-light-cyan/30 border border-light-cyan rounded-md p-3 text-xs text-mid-blue">
                    The portal will automatically include the section you're on, your progress, and your browser info so we can diagnose and fix.
                  </div>
                </div>
                <div className="px-6 py-4 border-t border-light-cyan flex items-center justify-end gap-3">
                  <button onClick={onClose} className="text-mid-blue hover:text-secondary text-sm font-heading font-semibold">Cancel</button>
                  <button
                    onClick={handleSubmit}
                    disabled={!description.trim()}
                    className="bg-accent hover:bg-accent/90 text-deep-navy font-heading font-semibold px-5 py-2.5 rounded-md text-sm transition disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    Send bug report →
                  </button>
                </div>
              </>
            )}
            {phase === 'submitted' && (
              <div className="px-6 py-8 text-center">
                <div className="text-5xl mb-3">✅</div>
                <div className="font-heading font-semibold text-secondary text-lg mb-2">Bug report saved</div>
                <p className="text-text text-sm leading-relaxed mb-4">
                  Your report was saved locally and an email draft was opened in your default mail app. If the email
                  didn't open, no problem — the report is still saved and will be reviewed.
                </p>
                <button onClick={onClose} className="bg-secondary hover:bg-secondary/90 text-white font-heading font-semibold px-5 py-2.5 rounded-md text-sm">
                  Back to course
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function BugReportsViewer() {
      const [reports, setReports] = useState(loadBugReports());
      const [confirmClear, setConfirmClear] = useState(false);
      const [copiedId, setCopiedId] = useState(null);
      const refresh = () => setReports(loadBugReports());

      const copyOne = (report) => {
        navigator.clipboard.writeText(JSON.stringify(report, null, 2));
        setCopiedId(report.id);
        setTimeout(() => setCopiedId(null), 1500);
      };
      const copyAll = () => {
        navigator.clipboard.writeText(JSON.stringify(reports, null, 2));
        setCopiedId('all');
        setTimeout(() => setCopiedId(null), 1500);
      };
      const clearAll = () => {
        clearBugReports();
        refresh();
        setConfirmClear(false);
      };

      return (
        <div className="space-y-5">
          <div>
            <h2 className="font-heading font-bold text-2xl text-secondary mb-2">Bug Reports</h2>
            <p className="text-text leading-relaxed text-sm">
              Bug reports submitted from this portal are stored locally on your device. Use these for review or to copy
              the JSON for diagnosis. Clearing reports here doesn't affect any reports already emailed.
            </p>
          </div>
          {reports.length === 0 ? (
            <div className="bg-light-cyan/30 border border-light-cyan rounded-lg p-8 text-center">
              <div className="text-3xl mb-2">📭</div>
              <div className="font-heading font-semibold text-secondary mb-1">No bug reports yet</div>
              <div className="text-mid-blue text-sm">When agents submit bugs via the floating "Report bug" button, they'll show up here.</div>
            </div>
          ) : (
            <>
              <div className="flex items-center justify-between gap-3">
                <div className="text-sm text-mid-blue">{reports.length} report{reports.length !== 1 ? 's' : ''}</div>
                <div className="flex items-center gap-2">
                  <button onClick={copyAll} className="text-xs font-heading font-semibold text-secondary hover:text-accent">
                    {copiedId === 'all' ? '✓ Copied' : 'Copy all as JSON'}
                  </button>
                  {!confirmClear ? (
                    <button onClick={() => setConfirmClear(true)} className="text-xs font-heading font-semibold text-red-600 hover:text-red-700">Clear all</button>
                  ) : (
                    <>
                      <button onClick={clearAll} className="text-xs font-heading font-semibold text-red-600 hover:text-red-700">Confirm clear</button>
                      <button onClick={() => setConfirmClear(false)} className="text-xs text-mid-blue hover:text-secondary">Cancel</button>
                    </>
                  )}
                </div>
              </div>
              <div className="space-y-3">
                {[...reports].reverse().map((r) => (
                  <div key={r.id} className="bg-white border border-light-cyan rounded-lg p-4">
                    <div className="flex items-start justify-between gap-3 mb-2">
                      <div>
                        <div className="font-heading font-semibold text-secondary text-sm">{r.section.label}</div>
                        <div className="text-xs text-mid-blue tabular-nums">{new Date(r.timestamp).toLocaleString()}</div>
                      </div>
                      <button onClick={() => copyOne(r)} className="text-xs font-heading font-semibold text-secondary hover:text-accent flex-shrink-0">
                        {copiedId === r.id ? '✓ Copied' : 'Copy JSON'}
                      </button>
                    </div>
                    <p className="text-text text-sm leading-relaxed mb-2">{r.description}</p>
                    {r.expected && <p className="text-text text-xs leading-relaxed mb-1"><span className="text-mid-blue font-heading font-semibold">Expected:</span> {r.expected}</p>}
                    {r.steps && <p className="text-text text-xs leading-relaxed mb-1"><span className="text-mid-blue font-heading font-semibold">Steps:</span> {r.steps}</p>}
                    {r.agentId && <p className="text-xs text-mid-blue mt-1">Agent: {r.agentId}</p>}
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      );
    }

        if (filter !== 'All' && s.category !== filter) return false;
